services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Next rewrites /api-go/* to this URL (browser uses same-origin /api-go — no CORS for dashboard).
      PORTFOLIO_API_INTERNAL_URL: ${PORTFOLIO_API_INTERNAL_URL:-http://portfolio-api:8080}
      # Optional: set to call portfolio-api directly from the browser (then configure CORS + LAN URL).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    networks:
      - portfolio-net
    depends_on:
      - portfolio-api

  portfolio-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BIN: portfolio-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://portfolio:changeme@db:5432/portfolio?sslmode=disable}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-changeme}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-changeme}
      HTTP_ADDR: :8080
      # Origins allowed for browser requests (add http://<LAN-IP>:3000 for other devices on your network).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    networks:
      - portfolio-net
    depends_on:
      db:
        condition: service_healthy

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BIN: ingest
    environment:
      IBKR_MODE: ${IBKR_MODE:-mock}
      IBKR_GATEWAY_HOST: ${IBKR_GATEWAY_HOST:-ib-gateway}
      IBKR_GATEWAY_PORT: ${IBKR_GATEWAY_PORT:-4001}
      INGEST_INTERVAL: ${INGEST_INTERVAL:-10m}
      PORTFOLIO_API_URL: ${PORTFOLIO_API_URL:-http://portfolio-api:8080}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-changeme}
    networks:
      - portfolio-net
    depends_on:
      - portfolio-api
      - ib-gateway
    restart: unless-stopped

  signals:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BIN: signals
    environment:
      SIGNAL_RULES_PATH: ${SIGNAL_RULES_PATH:-/app/config/signals.yaml}
      SIGNAL_COOLDOWN: ${SIGNAL_COOLDOWN:-1h}
      SIGNAL_INTERVAL: ${SIGNAL_INTERVAL:-5m}
      SIGNAL_DEDUP_PATH: ${SIGNAL_DEDUP_PATH:-/app/data/signal-dedup.json}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-changeme}
      PORTFOLIO_API_URL: ${PORTFOLIO_API_URL:-http://portfolio-api:8080}
    volumes:
      - signal_dedup:/app/data
    networks:
      - portfolio-net
    depends_on:
      - portfolio-api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - portfolio-net

  ib-gateway:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    ports:
      - "4001:4001"
      - "4002:4002"
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge

volumes:
  pgdata:
  signal_dedup:
